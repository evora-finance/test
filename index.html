<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{{TITLE}}</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <nav class="sticky top-0 w-full z-50 bg-white/90 backdrop-blur-md shadow-sm">
        <div class="flex justify-between items-center max-w-5xl mx-auto px-6 h-16">
            <div class="text-xl font-black tracking-tighter text-blue-900 uppercase">
                <a href="/">ЭВОРА <span class="text-blue-600">ЗАЙМЫ</span></a>
            </div>
            <div class="flex items-center gap-8">
                <a class="font-bold text-sm text-slate-500 hover:text-blue-900 transition-colors" href="/">На главную</a>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-10">
        <nav class="flex text-[10px] text-slate-400 gap-2 mb-8 uppercase font-bold tracking-widest">
            <a href="/">Главная</a> <span>/</span> <span class="text-slate-900">{{KEYWORD}}</span>
        </nav>

        <header class="mb-12">
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter text-blue-900 mb-6">{{H1}}</h1>
            <p class="text-lg text-slate-600 leading-relaxed">{{INTRO}}</p>
        </header>

        <article class="prose prose-slate max-w-none mb-16">
            {{CONTENT}}
        </article>

        <section class="border-t pt-10">
            <h2 class="text-2xl font-bold mb-6 italic text-blue-900">Вопросы и ответы</h2>
            {{FAQ}}
        </section>
    </main>

    <footer class="bg-slate-900 text-slate-500 py-10 text-center text-xs">
        <p>© 2026 Эвора Финанс. Все займы на одной странице.</p>
    </footer>

    <script>
        const GIST_URL = 'https://gist.githubusercontent.com/myprojekt1dk-ai/dafe30b743de00fa88d5e3d1de1423b9/raw/config.json?v=' + Date.now();
        fetch(GIST_URL).then(r => r.json()).then(d => {
            if(d.target_link) {
                document.querySelectorAll('a[href="#cta"]').forEach(a => a.href = d.target_link);
            }
        }).catch(e => console.log('Standard link used'));
    </script>
</body>
</html>
